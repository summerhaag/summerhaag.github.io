<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shader Collection</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      #app {
        width: 100%;
        height: 100%;
      }
      .layout-quad-view {
        grid-template-rows: unset;
        grid-auto-rows: 1fr;
      }

      /* Gallery mode */
      body.gallery-mode {
        overflow: auto;
        background: #0d0d0d;
        color: #fff;
        font-family: monospace;
      }
      .gallery {
        max-width: 1100px;
        margin: 0 auto;
        padding: 48px 24px 80px;
      }
      .gallery-header h1 {
        font-size: 1.75rem;
        font-weight: normal;
        margin-bottom: 40px;
        color: #eee;
      }
      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 12px;
      }
      .shader-card {
        display: block;
        background: #141414;
        border: 1px solid #272727;
        border-radius: 6px;
        padding: 20px;
        text-decoration: none;
        color: #fff;
        transition: border-color 0.15s, background 0.15s;
      }
      .shader-card:hover {
        border-color: #444;
        background: #1c1c1c;
      }
      .shader-name {
        font-size: 1rem;
        margin-bottom: 6px;
        color: #eee;
      }
      .shader-desc {
        font-size: 0.8rem;
        color: #777;
        margin-bottom: 10px;
        line-height: 1.5;
        font-family: sans-serif;
      }
      .shader-slug {
        font-size: 0.72rem;
        color: #444;
      }
    </style>
    <script type="module" crossorigin src="./assets/main.js"></script>
    
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
